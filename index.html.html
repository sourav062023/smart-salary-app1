<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>স্মার্ট স্যালারি ড্যাশবোর্ড</title>
    <!-- ১. Chart.js লাইব্রেরি (এটি অবশ্যই লাগবে) -->
    <script src="https://jsdelivr.net"></script>
    
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 50px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        h2 { color: #1a73e8; }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: #1a73e8; outline: none; }
        button { width: 100%; padding: 15px; background-color: #1a73e8; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #1557b0; }
        .result-box { margin-top: 30px; display: none; text-align: left; }
        .take-home-amount { font-size: 28px; font-weight: bold; color: #2d3436; margin: 10px 0; }
        .ai-card { background: #e3f2fd; padding: 15px; border-radius: 10px; border-left: 5px solid #1a73e8; margin-top: 20px; font-size: 14px; }
        canvas { margin-top: 20px; max-height: 300px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>স্মার্ট পে-রোল AI</h2>
        <input type="number" id="ctcInput" placeholder="আপনার বাৎসরিক CTC লিখুন (₹)">
        <button onclick="calculateSalary()">হিসাব শুরু করুন</button>

        <div id="resultBox" class="result-box">
            <p style="color: #636e72; margin-bottom: 5px;">মাসিক টেক-হোম বেতন:</p>
            <div id="takeHomeResult" class="take-home-amount"></div>
            
            <!-- চার্টের জায়গা -->
            <canvas id="salaryChart"></canvas>

            <!-- AI পরামর্শ কার্ড -->
            <div id="aiAdvice" class="ai-card"></div>
        </div>
    </div>

    <script>
        function calculateSalary() {
            let ctc = document.getElementById('ctcInput').value;
            if(!ctc || ctc <= 0) { alert("সঠিক বেতন লিখুন"); return; }

            // ১. ক্যালকুলেশন
            let monthlyGross = ctc / 12;
            let basicPay = monthlyGross * 0.50;
            let epf = basicPay * 0.12;
            let profTax = 200;
            let takeHome = monthlyGross - epf - profTax;

            // ২. রেজাল্ট ও AI টেক্সট দেখানো
            document.getElementById('takeHomeResult').innerText = "₹ " + takeHome.toLocaleString('en-IN');
            document.getElementById('resultBox').style.display = "block";

            let advice = "";
            if(ctc <= 750000) advice = "💡 AI: আপনার জন্য 'New Regime' সেরা। কোনো ট্যাক্স লাগবে না।";
            else advice = "💡 AI: আপনি ১.৫ লক্ষ টাকা 80C তে ইনভেস্ট করলে ট্যাক্স বাঁচাতে পারবেন।";
            document.getElementById('aiAdvice').innerText = advice;

            // ৩. চার্ট তৈরি (পুরানো চার্ট মুছে নতুনটি ড্র করা)
            let chartStatus = Chart.getChart("salaryChart");
            if (chartStatus != undefined) chartStatus.destroy();

            const ctx = document.getElementById('salaryChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut', // গোল চার্ট
                data: {
                    labels: ['হাতে পাবেন', 'EPF সঞ্চয়', 'ট্যাক্স'],
                    datasets: [{
                        data: [takeHome, epf, profTax],
                        backgroundColor: ['#1a73e8', '#ffb142', '#ff5252'],
                        hoverOffset: 4
                    }]
                },
                options: {
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }
    </script>
</body>
</html>

    </script>

</body>
</html>
