<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্মার্ট স্যালারি অ্যাপ</title>
    <!-- ১. লাইব্রেরি লোড হচ্ছে কি না তা নিশ্চিত করতে এই লিঙ্কটি জরুরি -->
    <script src="https://jsdelivr.net"></script>
    
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { width: 95%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        #resultArea { margin-top: 20px; display: none; }
        .amount { font-size: 24px; font-weight: bold; color: #28a745; margin: 10px 0; }
        canvas { margin-top: 20px; max-width: 100% !important; height: auto !important; }
    </style>
</head>
<body>

<div class="card">
    <h2>স্যালারি ক্যালকুলেটর</h2>
    <input type="number" id="ctc" placeholder="বাৎসরিক বেতন (যেমন: ৬০০০০০)">
    <button onclick="doCalculation()">হিসাব দেখুন</button>

    <div id="resultArea">
        <p>আপনার মাসিক টেক-হোম:</p>
        <div id="finalPay" class="amount"></div>
        
        <!-- চার্টের জায়গা -->
        <div style="position: relative; height:300px; width:100%">
            <canvas id="myChart"></canvas>
        </div>
    </div>
</div>

<script>
    function doCalculation() {
        const ctc = document.getElementById('ctc').value;
        if(!ctc) { alert("বেতন লিখুন"); return; }

        const monthly = ctc / 12;
        const epf = (monthly * 0.5) * 0.12;
        const pt = 200;
        const takeHome = monthly - epf - pt;

        // ফলাফল দেখানো
        document.getElementById('finalPay').innerText = "₹ " + Math.round(takeHome).toLocaleString('en-IN');
        document.getElementById('resultArea').style.display = "block";

        // চার্ট তৈরি করার আগে চেক করা লাইব্রেরি লোড হয়েছে কি না
        if (typeof Chart !== 'undefined') {
            const chartStatus = Chart.getChart("myChart");
            if (chartStatus !== undefined) {
                chartStatus.destroy();
            }

            const ctx = document.getElementById('myChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['টেক-হোম', 'EPF', 'ট্যাক্স'],
                    datasets: [{
                        data: [takeHome, epf, pt],
                        backgroundColor: ['#28a745', '#ffc107', '#dc3545']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        } else {
            console.error("Chart.js লোড হয়নি। দয়া করে ইন্টারনেট কানেকশন চেক করুন।");
            alert("চার্ট লোড হতে পারছে না, তবে আপনার হিসাব উপরে দেওয়া হয়েছে।");
        }
    }
</script>

</body>
</html>
